services:
  postgres:
    image: postgres:17-alpine
    container_name: warehousecontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-warehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warehouse}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warehouse} -d ${POSTGRES_DB:-warehouse}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrations:
    image: migrate/migrate:v4.18.3
    container_name: warehousecontrol-migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path=/migrations",
        "-database=postgres://${POSTGRES_USER:-warehouse}:${POSTGRES_PASSWORD:-warehouse}@${POSTGRES_DOCKER_HOST:-postgres}:${POSTGRES_DOCKER_PORT:-5432}/${POSTGRES_DB:-warehouse}?sslmode=${POSTGRES_SSLMODE:-disable}",
        "up"
      ]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehousecontrol-app
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      HTTP_HOST: ${HTTP_HOST:-0.0.0.0}
      HTTP_PORT: ${HTTP_PORT:-8080}
      POSTGRES_HOST: ${POSTGRES_DOCKER_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_DOCKER_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-warehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warehouse}
      POSTGRES_DB: ${POSTGRES_DB:-warehouse}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      POSTGRES_SLAVE_DSNS: ${POSTGRES_SLAVE_DSNS:-}
      POSTGRES_MAX_OPEN_CONNS: ${POSTGRES_MAX_OPEN_CONNS:-10}
      POSTGRES_MAX_IDLE_CONNS: ${POSTGRES_MAX_IDLE_CONNS:-5}
      POSTGRES_CONN_MAX_LIFETIME_SECONDS: ${POSTGRES_CONN_MAX_LIFETIME_SECONDS:-300}
      JWT_SECRET: ${JWT_SECRET:-warehouse-control-secret}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-12}
      WEB_DIR: /app/web
    ports:
      - "${HTTP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres-data:
