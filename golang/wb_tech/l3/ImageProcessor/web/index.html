<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImageProcessor</title>
  <link rel="stylesheet" href="/styles.css?v=20260329-4">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">ImageProcessor</p>
      <h1>Фоновая обработка изображений</h1>
      <p class="lead">Один экран для загрузки, отслеживания статуса и просмотра готового результата.</p>
    </section>

    <section class="upload-card">
      <form id="upload-form" class="upload-form">
        <label class="upload-field" for="file-input">
          <span>Выберите изображение</span>
          <input id="file-input" name="file" type="file" accept="image/png,image/jpeg,image/gif" required>
        </label>
        <button id="upload-button" type="submit">Загрузить</button>
      </form>
      <p id="upload-status" class="upload-status">Поддерживаются JPG, PNG и GIF.</p>
    </section>

    <section class="gallery-section">
      <div class="section-head">
        <h2>Изображения</h2>
        <button id="refresh-button" type="button" class="ghost">Обновить</button>
      </div>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>

  <template id="image-card-template">
    <article class="image-card">
      <div class="preview-wrap">
        <img class="preview" alt="Preview">
        <span class="status-pill"></span>
      </div>
      <div class="card-body">
        <div>
          <h3 class="file-name"></h3>
          <p class="meta"></p>
        </div>
        <p class="message"></p>
        <div class="actions">
          <a class="download-link ghost" target="_blank" rel="noreferrer">Открыть</a>
          <button class="delete-button danger" type="button">Удалить</button>
        </div>
      </div>
    </article>
  </template>

  <script src="/app.js?v=20260329-4" defer></script>
</body>
</html>
